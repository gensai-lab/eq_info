<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震情報シミュレーター</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #333; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        /* 左側情報パネル */
        .info-panel {
            position: absolute;
            top: 0; left: 0;
            width: 280px;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            padding: 0;
            box-sizing: border-box;
        }

        .header { background: #0055ff; padding: 10px; font-weight: bold; }
        .header .sub { font-size: 12px; }
        .header .main { font-size: 32px; letter-spacing: 2px; }

        .content { padding: 15px; flex-grow: 1; }
        .label { background: #fff; color: #000; display: inline-block; padding: 2px 8px; font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .value { font-size: 22px; margin-bottom: 20px; font-weight: bold; }

        /* 最大震度表示 */
        .max-int-box {
            border: 2px solid #fff;
            padding: 10px;
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .max-int-label { font-size: 18px; }
        #max-int-value { font-size: 48px; font-weight: bold; }

        /* 下部テロップエリア */
        .bottom-info { position: absolute; bottom: 0; left: 0; width: 100%; z-index: 1001; }
        #tsunami-status {
            background: #800080; color: white; padding: 10px 20px; font-size: 20px; font-weight: bold; width: fit-content; min-width: 300px;
        }
        #eew-status {
            background: #ff0; color: #000; padding: 10px 20px; font-size: 18px; font-weight: bold; width: fit-content; min-width: 300px; display: none;
        }

        /* 震度別の色定義 */
        .int-7 { color: #ffff00; background-color: #780000 !important; }
        .int-6plus { color: #ffffff; background-color: #d90429 !important; }
        .int-6minus { color: #ffffff; background-color: #ef233c !important; }
        .int-5plus { color: #ffffff; background-color: #f77f00 !important; }
        .int-5minus { color: #ffffff; background-color: #fcbf49 !important; }
    </style>
</head>
<body>

<div class="info-panel">
    <div class="header">
        <div class="sub">Earthquake Information</div>
        <div class="main">地震情報</div>
    </div>
    <div class="content">
        <div id="intensity-container" class="max-int-box">
            <span class="max-int-label">最大震度</span>
            <span id="max-int-value">--</span>
        </div>

        <div class="label">発生日時</div>
        <div id="date-time" class="value">----年--月--日<br>--時--分ごろ</div>

        <div class="label">震源地</div>
        <div id="location" class="value">----</div>

        <div class="label">地震の規模</div>
        <div id="magnitude" class="value">M-.--</div>

        <div class="label">地震の深さ</div>
        <div id="depth" class="value">約 -- km</div>
    </div>
</div>

<div class="bottom-info">
    <div id="tsunami-status">津波の心配なし</div>
    <div id="eew-status">緊急地震速報が発表されています</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([36.5, 138.0], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    async function updateEarthquakeInfo() {
        try {
            const response = await fetch('https://api.wolfx.jp/jma_eqlist.json');
            const data = await response.json();
            const latest = data[0]; // 最新の地震情報を取得

            // 1. 各項目の書き換え
            document.getElementById('max-int-value').innerText = latest.max_int;
            document.getElementById('date-time').innerHTML = latest.dt.replace(' ', '<br>');
            document.getElementById('location').innerText = latest.location;
            document.getElementById('magnitude').innerText = 'M' + latest.mag;
            document.getElementById('depth').innerText = '約 ' + latest.depth + ' km';

            // 2. 最大震度の色設定
            const intBox = document.getElementById('intensity-container');
            intBox.className = 'max-int-box'; // リセット
            if (latest.max_int === '7') intBox.classList.add('int-7');
            else if (latest.max_int === '6+') intBox.classList.add('int-6plus');
            else if (latest.max_int === '6-') intBox.classList.add('int-6minus');
            else if (latest.max_int === '5+') intBox.classList.add('int-5plus');
            else if (latest.max_int === '5-') intBox.classList.add('int-5minus');

            // 3. 津波情報の判定
            const tsunamiText = document.getElementById('tsunami-status');
            if (latest.tsunami === "MajorWarning") {
                tsunamiText.innerText = "大津波警報・津波警報 発令中";
                tsunamiText.style.background = "#800080";
            } else if (latest.tsunami === "Warning") {
                tsunamiText.innerText = "津波警報 発令中";
                tsunamiText.style.background = "#ff0000";
            } else if (latest.tsunami === "Advisory") {
                tsunamiText.innerText = "津波注意報 発令中";
                tsunamiText.style.background = "#ffff00";
                tsunamiText.style.color = "#000";
            } else if (latest.tsunami === "Forecast") {
                tsunamiText.innerText = "津波被害の心配なし";
                tsunamiText.style.background = "#0055ff";
            } else {
                tsunamiText.innerText = "津波の心配なし";
                tsunamiText.style.background = "#0055ff";
            }

            // 4. 緊急地震速報の表示/非表示
            // APIの仕様に基づき、緊急地震速報のフラグ(例: is_eew)がある場合に表示
            const eewBox = document.getElementById('eew-status');
            if (latest.is_eew) { // APIに当該フラグがある場合。ない場合は震度5弱以上などで判定も可能
                eewBox.style.display = 'block';
            } else {
                eewBox.style.display = 'none';
            }

            // 5. 地図に震源地マークを表示
            L.marker([latest.latitude, latest.longitude]).addTo(map)
                .bindPopup(latest.location).openPopup();
            map.panTo([latest.latitude, latest.longitude]);

        } catch (error) {
            console.error('データ取得エラー:', error);
        }
    }

    updateEarthquakeInfo();
    setInterval(updateEarthquakeInfo, 30000); // 30秒ごとに更新
</script>
</body>
</html>
