<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>地震情報 - Kactuif System</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* フォント設定: A-OTF UD新ゴ Pr6N を最優先 */
        body {
            margin: 0; padding: 0; overflow: hidden;
            font-family: "A-OTF UD新ゴ Pr6N", "UD Shin Go Pr6N", "M+ 2p", sans-serif;
            background: #000;
        }

        #map { height: 100vh; width: 100%; z-index: 1; filter: brightness(0.8) contrast(1.2); }

        /* 左側情報パネル */
        .side-panel {
            position: absolute; top: 0; left: 0; width: 320px; height: 100%;
            background: rgba(20, 20, 20, 0.9); color: white; z-index: 1000;
            display: flex; flex-direction: column; border-right: 2px solid #444;
        }

        .header { background: #0055ff; padding: 15px; }
        .header-en { font-size: 14px; opacity: 0.8; }
        .header-jp { font-size: 36px; font-weight: 900; letter-spacing: 1px; }

        .info-content { padding: 20px; flex-grow: 1; }
        
        /* 最大震度ボックス */
        .max-shindo-container {
            border: 2px solid #fff; margin-bottom: 25px; display: flex; align-items: center;
        }
        .shindo-label { background: #fff; color: #000; padding: 10px; font-weight: bold; font-size: 20px; }
        .shindo-value { flex-grow: 1; text-align: center; font-size: 64px; font-weight: 900; }

        .item-label { background: #eee; color: #333; display: inline-block; padding: 2px 10px; font-size: 16px; font-weight: bold; margin-bottom: 8px; }
        .item-value { font-size: 24px; font-weight: bold; margin-bottom: 20px; line-height: 1.4; }

        /* 下部ステータス */
        .bottom-status { position: absolute; bottom: 40px; left: 340px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        
        .status-box { padding: 12px 25px; font-size: 28px; font-weight: 900; color: white; box-shadow: 4px 4px 10px rgba(0,0,0,0.5); }
        #tsunami-box { background: #0055ff; } /* デフォルト */
        #eew-box { background: #ffea00; color: #000; display: none; }

        /* 震度別カラー (NHK/気象庁準拠イメージ) */
        .shindo-7  { background-color: #780000 !important; color: #fff; }
        .shindo-6plus  { background-color: #d90429 !important; }
        .shindo-6minus { background-color: #ef233c !important; }
        .shindo-5plus  { background-color: #f77f00 !important; }
        .shindo-5minus { background-color: #fcbf49 !important; color: #000; }
    </style>
</head>
<body>

<div class="side-panel">
    <div class="header">
        <div class="header-en">Earthquake Information</div>
        <div class="header-jp">地震情報</div>
    </div>
    <div class="info-content">
        <div class="max-shindo-container" id="shindo-bg">
            <div class="shindo-label">最大震度</div>
            <div class="shindo-value" id="shindo-txt">X</div>
        </div>

        <div class="item-label">発生日時</div>
        <div class="item-value" id="time-txt">2026年XX月XX日<br>XX時XX分ごろ</div>

        <div class="item-label">震源地</div>
        <div class="item-value" id="loc-txt">震源地名</div>

        <div class="item-label">地震の規模</div>
        <div class="item-value" id="mag-txt">M0.0</div>

        <div class="item-label">地震の深さ</div>
        <div class="item-value" id="dep-txt">約XXキロ</div>
    </div>
</div>

<div class="bottom-status">
    <div id="tsunami-box" class="status-box">津波の心配なし</div>
    <div id="eew-box" class="status-box">緊急地震速報が発表されています</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 地図初期化
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([35.0, 138.0], 7);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

    async function fetchEQ() {
        try {
            const res = await fetch('https://api.wolfx.jp/jma_eqlist.json');
            const data = await res.json();
            const eq = data[0]; // 最新の1件を取得

            // 基本情報反映
            document.getElementById('shindo-txt').innerText = eq.shindo;
            document.getElementById('time-txt').innerHTML = eq.time.replace(' ', '<br>');
            document.getElementById('loc-txt').innerText = eq.location;
            document.getElementById('mag-txt').innerText = 'M' + eq.magnitude;
            document.getElementById('dep-txt').innerText = '約' + eq.depth;

            // 震度カラー適用
            const bg = document.getElementById('shindo-bg');
            bg.className = 'max-shindo-container';
            if(eq.shindo === '7') bg.classList.add('shindo-7');
            if(eq.shindo === '6+') bg.classList.add('shindo-6plus');
            if(eq.shindo === '6-') bg.classList.add('shindo-6minus');
            if(eq.shindo === '5+') bg.classList.add('shindo-5plus');
            if(eq.shindo === '5-') bg.classList.add('shindo-5minus');

            // 津波情報判定
            const tsBox = document.getElementById('tsunami-box');
            const tsInfo = eq.info || "";
            if (tsInfo.includes("大津波警報")) {
                tsBox.innerText = "大津波警報・津波警報 発令中";
                tsBox.style.background = "#aa00aa";
            } else if (tsInfo.includes("津波警報")) {
                tsBox.innerText = "津波警報 発令中";
                tsBox.style.background = "#ff0000";
            } else if (tsInfo.includes("津波注意報")) {
                tsBox.innerText = "津波注意報 発令中";
                tsBox.style.background = "#fff100";
                tsBox.style.color = "#000";
            } else if (tsInfo.includes("津波被害の心配なし") || tsInfo.includes("若干の海面変動")) {
                tsBox.innerText = "津波被害の心配なし";
                tsBox.style.background = "#0055ff";
                tsBox.style.color = "#fff";
            } else {
                tsBox.innerText = "津波の心配なし";
                tsBox.style.background = "#0055ff";
                tsBox.style.color = "#fff";
            }

            // 緊急地震速報 (EEW) 判定
            const eewBox = document.getElementById('eew-box');
            if (eq.Title && eq.Title.includes("緊急地震速報")) {
                eewBox.style.display = 'block';
            } else {
                eewBox.style.display = 'none';
            }

            // 震源地マーク表示
            map.eachLayer((layer) => { if (layer instanceof L.Marker) map.removeLayer(layer); });
            const iconX = L.divIcon({
                className: 'custom-div-icon',
                html: "<div style='color:red; font-size:40px; font-weight:bold; transform:translate(-10px,-25px)'>×</div>",
                iconSize: [30, 42], iconAnchor: [15, 42]
            });
            L.marker([eq.latitude, eq.longitude], {icon: iconX}).addTo(map);
            map.panTo([eq.latitude, eq.longitude]);

        } catch (e) { console.error("Update error:", e); }
    }

    fetchEQ();
    setInterval(fetchEQ, 10000); // 10秒おきにチェック
</script>
</body>
</html>
