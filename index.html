<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>地震情報 - Kactuif System</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* デザイン案を忠実に再現するCSS */
        body {
            margin: 0; padding: 0; overflow: hidden;
            font-family: "A-OTF UD新ゴ Pr6N", "UD Shin Go Pr6N", sans-serif;
            background: #000;
        }

        #map { height: 100vh; width: 100%; z-index: 1; background: #000; }

        /* 左側パネル */
        .side-panel {
            position: absolute; top: 0; left: 0; width: 250px; height: 100%;
            background: rgba(15, 15, 15, 0.95); color: white; z-index: 1000;
            display: flex; flex-direction: column;
        }

        .header { background: #0055ff; padding: 10px; }
        .header-en { font-size: 10px; }
        .header-jp { font-size: 30px; font-weight: bold; }

        .info-content { padding: 15px; }

        /* 最大震度ボックス（画像のデザインを再現） */
        .max-shindo-container {
            border: 1px solid #fff; margin: 10px 0 20px 0; display: flex; align-items: center;
            background: rgba(255, 255, 255, 0.1);
        }
        .shindo-label { background: #fff; color: #000; padding: 5px 8px; font-weight: bold; font-size: 14px; }
        .shindo-value { flex-grow: 1; text-align: center; font-size: 50px; font-weight: bold; }

        .item-label { background: #fff; color: #000; display: inline-block; padding: 1px 6px; font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .item-value { font-size: 20px; font-weight: bold; margin-bottom: 15px; line-height: 1.2; }

        /* 下部ステータス */
        .bottom-status { position: absolute; bottom: 20px; left: 10px; z-index: 1000; display: flex; flex-direction: column; gap: 5px; }
        .status-box { padding: 8px 15px; font-size: 20px; font-weight: bold; color: white; display: inline-block; width: fit-content; }
        
        #tsunami-box { background: #0055ff; }
        #eew-box { background: #ffea00; color: #000; display: none; }

        /* 震度別カラー */
        .shindo-7  { background-color: #780000 !important; color: #ffff00; }
        .shindo-6plus  { background-color: #d90429 !important; }
        .shindo-6minus { background-color: #ef233c !important; }
        .shindo-5plus  { background-color: #f77f00 !important; }
        .shindo-5minus { background-color: #fcbf49 !important; color: #000; }
    </style>
</head>
<body>

<div class="side-panel">
    <div class="header">
        <div class="header-en">Earthquake Information</div>
        <div class="header-jp">地震情報</div>
    </div>
    <div class="info-content">
        <div class="max-shindo-container" id="shindo-bg">
            <div class="shindo-label">最大震度</div>
            <div class="shindo-value" id="shindo-txt">X</div>
        </div>

        <div class="item-label">発生日時</div>
        <div class="item-value" id="time-txt">----年--月--日<br>--時--分ごろ</div>

        <div class="item-label">震源地</div>
        <div class="item-value" id="loc-txt">震源地名</div>

        <div class="item-label">地震の規模</div>
        <div class="item-value" id="mag-txt">M0.0</div>

        <div class="item-label">地震の深さ</div>
        <div id="dep-txt" class="item-value">約--キロ</div>
    </div>
</div>

<div class="bottom-status">
    <div id="tsunami-box" class="status-box">読み込み中...</div>
    <div id="eew-box" class="status-box">緊急地震速報が発表されています</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 日本全域を表示する設定
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([36.5, 138.0], 5);
    
    // 背景を真っ暗にする（画像のデザインに合わせる）
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

    async function fetchEarthquake() {
        try {
            const res = await fetch('https://api.wolfx.jp/jma_eqlist.json');
            if (!res.ok) throw new Error('Network response was not ok');
            const data = await res.json();
            const eq = data[0]; 

            // 各項目をAPIのフィールド名に合わせて反映
            document.getElementById('shindo-txt').innerText = eq.shindo;
            document.getElementById('time-txt').innerHTML = eq.time.replace(' ', '<br>');
            document.getElementById('loc-txt').innerText = eq.location;
            document.getElementById('mag-txt').innerText = 'M' + eq.magnitude;
            document.getElementById('dep-txt').innerText = '約' + eq.depth;

            // 震度カラーの変更
            const bg = document.getElementById('shindo-bg');
            bg.className = 'max-shindo-container';
            const s = eq.shindo;
            if (s === '7') bg.classList.add('shindo-7');
            else if (s === '6+') bg.classList.add('shindo-6plus');
            else if (s === '6-') bg.classList.add('shindo-6minus');
            else if (s === '5+') bg.classList.add('shindo-5plus');
            else if (s === '5-') bg.classList.add('shindo-5minus');

            // 津波情報の判定（APIのinfoフィールドを使用）
            const tsBox = document.getElementById('tsunami-box');
            const info = eq.info || "";
            if (info.includes("大津波警報")) {
                tsBox.innerText = "大津波警報・津波警報 発令中";
                tsBox.style.background = "#aa00aa";
            } else if (info.includes("津波警報")) {
                tsBox.innerText = "津波警報 発令中";
                tsBox.style.background = "#ff0000";
            } else if (info.includes("津波注意報")) {
